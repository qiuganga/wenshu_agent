app:
  environment: development
  debug: true

runtime:
  environment: dev

server:
  host: 0.0.0.0
  port: 8000
  workers: 1
  shutdown_timeout_seconds: 5

logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO
  json_format: false

db_meta:
  host: localhost
  port: 3307
  user: ghy
  password: change_me
  database: meta

db_dw:
  host: localhost
  port: 3307
  user: ghy_readonly
  password: change_me
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

es:
  host: localhost
  port: 9200
  index_name: data-agent-value

redis:
  host: localhost
  port: 6379
  db: 0
  password: ""
  key_prefix: wenshu-agent
  socket_timeout_seconds: 2

telemetry:
  enabled: true
  service_name: wenshu-agent
  exporter: console

llm:
  model_name: deepseek-ai/DeepSeek-V3
  default_model: deepseek-ai/DeepSeek-V3
  fallback_model: ""
  api_key: your_siliconflow_api_key_here
  base_url: https://api.siliconflow.cn/v1
  temperature: 0
  timeout_seconds: 30
  max_retries: 2

agent:
  max_sql_retries: 2
  max_result_rows: 200
  result_sample_rows: 20
  result_sample_value_max_chars: 500
  query_timeout_seconds: 10
  llm_output_parse_retries: 2
  allow_select_star: false
  expose_sql_to_client: false
  expose_raw_rows_to_client: false
  max_sse_payload_bytes: 262144
  disconnect_poll_interval_seconds: 0.2
  sse_queue_maxsize: 100
  sse_put_timeout_seconds: 1
  max_concurrent_queries: 20
  max_concurrent_queries_per_user: 3
  admission_timeout_seconds: 2
  request_dedup_ttl_seconds: 30
  request_dedup_max_entries: 1000
  query_total_timeout_seconds: 60
  checkpoint_ttl_seconds: 3600
  token_batch_chars: 80
  max_candidate_tables: 10
  max_candidate_metrics: 10
  max_estimated_rows: 100000
  max_query_cost: 100000.0
  max_join_tables: 8
  max_full_scan_fact_tables: 0
  max_unknown_full_scan_rows: 10000
  allow_dimension_full_scan: true
  explain_timeout_seconds: 5
  reject_full_table_scan: false
  reject_filesort: false
  reject_temporary_table: false
  reject_on_cost_error: false
  expose_trace_to_client: false
  log_full_sql: false
  banned_sql_functions:
    - benchmark
    - get_lock
    - is_free_lock
    - is_used_lock
    - load_file
    - master_pos_wait
    - release_lock
    - sleep
    - uuid_short

prompt:
  version_enabled: true
  default_version: v1

cost:
  enabled: true

cache:
  enabled: true
  exact_enabled: true
  semantic_enabled: true
  exact_ttl_seconds: 300
  semantic_ttl_seconds: 900
  semantic_similarity_threshold: 0.92
  semantic_top_k: 5
  max_entry_bytes: 65536
  lease_ttl_seconds: 30
  lease_wait_timeout_seconds: 5
  namespace_version: v1
  data_version: v1
  semantic_collection_name: wenshu_agent_semantic_cache
  cache_safe_final_summary: false

security:
  enabled: true
  production_mode: false
  default_policy: deny
  prompt_guard_enabled: true
  masking_enabled: true
  sensitive_fields:
    - account_no
    - api_key
    - bank_card
    - email
    - id_card
    - identity_card
    - mobile
    - passwd
    - password
    - phone
    - secret
    - telephone
    - token

authorization:
  rbac_enabled: true
  abac_enabled: true

tool_security:
  require_permission: true

metadata_sync:
  max_values_per_column: 5000
  batch_size: 100
