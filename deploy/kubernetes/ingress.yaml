apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wenshu-agent
  namespace: wenshu-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: wenshu-agent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wenshu-agent
                port:
                  name: http
