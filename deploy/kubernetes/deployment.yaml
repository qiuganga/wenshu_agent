apiVersion: apps/v1
kind: Deployment
metadata:
  name: wenshu-agent
  namespace: wenshu-agent
  labels:
    app.kubernetes.io/name: wenshu-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wenshu-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wenshu-agent
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/your-org/wenshu-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: wenshu-agent-config
            - secretRef:
                name: wenshu-agent-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
