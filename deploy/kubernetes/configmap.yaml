apiVersion: v1
kind: ConfigMap
metadata:
  name: wenshu-agent-config
  namespace: wenshu-agent
data:
  APP_RUNTIME_ENVIRONMENT: prod
  APP_SERVER_HOST: 0.0.0.0
  APP_SERVER_PORT: "8000"
  APP_SERVER_WORKERS: "2"
  APP_SERVER_SHUTDOWN_TIMEOUT_SECONDS: "30"
  APP_REDIS_HOST: redis
  APP_REDIS_PORT: "6379"
  APP_QDRANT_HOST: qdrant
  APP_QDRANT_PORT: "6333"
  APP_ES_HOST: elasticsearch
  APP_ES_PORT: "9200"
  APP_EMBEDDING_HOST: embedding
  APP_EMBEDDING_PORT: "80"
  APP_LOGGING_JSON_FORMAT: "true"
